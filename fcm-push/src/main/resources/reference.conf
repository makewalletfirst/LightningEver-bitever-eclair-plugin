fcm-push {
  // Master switch — set to false to load the plugin in pass-through mode (token tracking only, no push send).
  enabled = true

  // Absolute path to the Firebase service-account JSON downloaded from Firebase Console
  // (Project settings → Service accounts → Generate new private key).
  // Permissions on the file should be 0600 and owned by the eclair user.
  service-account-file = ${user.home}"/.eclair/fcm-service-account.json"

  // Firebase project id (must match the service-account JSON `project_id` field).
  // Used in the FCM HTTP v1 API URL: https://fcm.googleapis.com/v1/projects/<project-id>/messages:send
  project-id = "lightningever"

  // FCM HTTP v1 endpoint (rarely needs changing).
  fcm-endpoint = "https://fcm.googleapis.com"

  // OAuth2 access token TTL margin — refresh this many seconds before expiry.
  access-token-refresh-margin-seconds = 300

  // HTTP request timeout (connect + read) in seconds for the FCM send call.
  http-timeout-seconds = 10

  // Android push payload priority. "high" wakes the app from doze; "normal" is best-effort.
  android-priority = "high"

  // Time-to-live in seconds for the push message at FCM. After this, FCM drops it.
  // Default is 2 hours which covers brief offline windows.
  android-ttl-seconds = 7200
}
